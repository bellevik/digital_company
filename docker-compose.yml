services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-digital_company}
      POSTGRES_USER: ${POSTGRES_USER:-digital_company}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digital_company}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-digital_company} -d ${POSTGRES_DB:-digital_company}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      APP_NAME: Digital Company
      API_V1_PREFIX: /api/v1
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-digital_company}
      POSTGRES_USER: ${POSTGRES_USER:-digital_company}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digital_company}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
      SELF_IMPROVEMENT_INTERVAL_SECONDS: ${SELF_IMPROVEMENT_INTERVAL_SECONDS:-86400}
      CODEX_EXECUTION_BACKEND: ${CODEX_EXECUTION_BACKEND:-codex_cli}
      CODEX_WORKDIR: /workspace
      PROJECTS_ROOT: /projects
      HOME: /codex-home
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/workspace
      - ./backend:/app
      - ./projects:/projects
      - ${CODEX_HOME:-/Users/bellevik/.codex}:/codex-home/.codex
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
